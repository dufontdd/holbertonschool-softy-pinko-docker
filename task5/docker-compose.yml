version: '3.8'

services:
  back-end:
    build: ./back-end
    ports:
      - "5252"
    container_name: back-end

  front-end:
    build: ./front-end
    ports:
      - "9000"
    container_name: front-end

  proxy:
    build: ./proxy
    ports:
      - "80:80"
    container_name: proxy
    depends_on:
      - back-end
      - front-end
